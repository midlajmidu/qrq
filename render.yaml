services:
  # ─── Backend Service (FastAPI + Gunicorn) ───────────────────────────
  - type: web
    name: q4queue-backend
    env: docker
    dockerContext: ./backend
    dockerfilePath: Dockerfile
    plan: free 
    region: oregon 
    preDeployCommand: "alembic upgrade head"
    healthCheckPath: /api/v1/health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: q4queue-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: q4queue-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: "*" # Change this to your frontend URL after deploy
      - key: APP_HOST
        value: 0.0.0.0
      - key: APP_PORT
        value: 10000
    
  # ─── Frontend Service (Next.js) ──────────────────────────────────
  - type: web
    name: q4queue-frontend
    env: docker
    dockerContext: ./frontend
    dockerfilePath: Dockerfile
    plan: free
    region: oregon
    envVars:
      - key: NEXT_PUBLIC_API_BASE_URL
        value: "https://q4queue-backend.onrender.com/api/v1" # Placeholder - update in dashboard
      - key: NEXT_PUBLIC_WS_BASE_URL
        value: "wss://q4queue-backend.onrender.com/api/v1/ws" # Placeholder - update in dashboard
      - key: NEXT_PUBLIC_APP_NAME
        value: Q4Queue
      - key: NEXT_PUBLIC_SHORT_LINKS
        value: "true"
    healthCheckPath: /

# ─── Database ────────────────────────────────────────────────────
databases:
  - name: q4queue-db
    plan: free
    region: oregon

# ─── Redis ───────────────────────────────────────────────────────
redis:
  - name: q4queue-redis
    plan: free
    region: oregon
    ipAllowList: []
