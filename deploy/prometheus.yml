# =============================================================================
# Prometheus scrape configuration for Queue Management SaaS
#
# Add to prometheus.yml:
# =============================================================================
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: "queue-backend"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["backend:8000"]
        labels:
          service: "queue-management"
          environment: "production"
