server {
    listen 80;
    server_name _;

    # ── Redirect HTTP to HTTPS (uncomment in production) ─────────
    # return 301 https://$host$request_uri;

    # ── Or proxy directly (for development / VM deploy) ──────────
    location / {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        # Body size limit (prevent abuse)
        client_max_body_size 1m;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # ── WebSocket upgrade ─────────────────────────────────────────
    location /api/v1/ws/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # WebSocket timeout (keep-alive)
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ── Health check (bypass rate limiting) ────────────────────────
    location /health {
        proxy_pass http://backend:8000/health;
        proxy_set_header Host $host;
        access_log off;
    }

    # ── Metrics (restrict access in production) ───────────────────
    location /metrics {
        proxy_pass http://backend:8000/metrics;
        proxy_set_header Host $host;
        # Uncomment to restrict to internal network:
        # allow 10.0.0.0/8;
        # allow 172.16.0.0/12;
        # deny all;
    }

    # ── Gzip compression ─────────────────────────────────────────
    gzip on;
    gzip_types application/json text/plain text/css application/javascript;
    gzip_min_length 256;

    # ── Edge rate limiting ────────────────────────────────────────
    # limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
    # limit_req zone=api burst=20 nodelay;
}

